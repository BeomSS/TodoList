<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Todo Do cute icon sample">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BEEBFF"/>
      <stop offset="55%" stop-color="#A7D8FF"/>
      <stop offset="100%" stop-color="#8CC2FF"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4F7DB3" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- rounded app icon base -->
  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#bg)"/>

  <!-- decorative bubbles -->
  <circle cx="210" cy="230" r="56" fill="#DDF3FF" opacity="0.85"/>
  <circle cx="820" cy="260" r="38" fill="#D7EEFF" opacity="0.9"/>
  <circle cx="790" cy="790" r="64" fill="#D9F0FF" opacity="0.65"/>

  <!-- main white pill card -->
  <rect x="136" y="250" width="752" height="520" rx="170" fill="url(#pill)" filter="url(#shadow)"/>

  <!-- cute check circles -->
  <circle cx="250" cy="420" r="36" fill="#8FD3A8"/>
  <path d="M232 420l15 15 28-31" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="250" cy="560" r="30" fill="#FFD68F"/>
  <circle cx="250" cy="560" r="14" fill="#ffffff" opacity="0.9"/>

  <!-- text -->
  <text x="320" y="458" font-family="Avenir Next Rounded, Nunito, Arial Rounded MT Bold, sans-serif" font-size="130" font-weight="800" fill="#2F5F9A" letter-spacing="-2">Todo</text>
  <text x="320" y="610" font-family="Avenir Next Rounded, Nunito, Arial Rounded MT Bold, sans-serif" font-size="132" font-weight="900" fill="#2D76D2" letter-spacing="-1">Do!</text>

  <!-- tiny sparkle -->
  <path d="M760 360l10 24 24 10-24 10-10 24-10-24-24-10 24-10z" fill="#FFFFFF" opacity="0.9"/>
</svg>
